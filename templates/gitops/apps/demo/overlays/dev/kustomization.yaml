apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: demo-dev
resources:
  - ../../base
images:
  - name: ghcr.io/example/demo
    newTag: dev-latest
patches:
  - target:
      kind: Ingress
      name: demo
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: demo-dev.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: demo-dev.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: demo-dev-tls
