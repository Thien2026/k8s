# Copy file này thành env.yaml và điền thông tin khách
# Không commit env.yaml nếu có secret thật

profile: rke2         # rke2 | kubeadm | eks | gke | aks  (không dùng k3s cho bàn giao)
customer: ten-khach
domain: example.com

cluster:
  name: platform-01
  nodes:
    - ip: 1.2.3.4
      role: control-plane,worker
    # - ip: 1.2.3.5
    #   role: worker

github:
  org: ten-org
  platform_repo: k8s-platform
  gitops_repo: company-gitops

domains:
  rancher: rancher.example.com
  harbor: harbor.example.com
  argocd: argocd.example.com
  grafana: grafana.example.com

harbor:
  project: demo
  # robot_account và password lưu secret manager, không ghi plain text

letsencrypt:
  email: admin@example.com
  issuer: letsencrypt-prod   # letsencrypt-staging khi test

env_model: single-cluster    # single-cluster | dual-cluster
# single-cluster: namespace-dev + namespace-prod
# dual-cluster: cluster-dev + cluster-prod
